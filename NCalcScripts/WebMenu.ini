string json = "'WebMenu.file' format"

[ExportProperty]
name='WebMenu.file'
value='PluginsData/WebMenu.json'

string game = "WebMenu.gameprops are per-game"
[ExportProperty]
name='WebMenu.gameprops'
value='Fmin.FrontLeft,Fmin.FrontRight,Fmin.RearLeft,Fmin.RearRight,Fmax.FrontLeft,Fmax.FrontRight,Fmax.RearLeft,Fmax.RearRight'

[ExportProperty]
name='WebMenu.gamevals'
value='30,30,30,30,400,400,400,400'

[ExportProperty]
name='WebMenu.gamesteps'
value='1,1,1,1,10,10,10,10'

string comment = "WebMenu.properties are per-car"
[ExportProperty]
name='WebMenu.properties'
value='Gscale,threshold,SlipGain,gamma,EffectStrength'

[ExportProperty]
name='WebMenu.slider'
value='Gscale'

[ExportProperty]
name='WebMenu.values'
value='1,1,6,1,1'

[ExportProperty]
name='WebMenu.steps'
value='.1,1,.1,.1,.1'

string global = "WebMenu.settings are global, apply to all"

[ExportProperty]
name='WebMenu.settings'
value='global'

[ExportProperty]
name='WebMenu.setvals'
value='42'

[ExportProperty]
name='WebMenu.setsteps'
value='1'

string notify = "required for plugin to track car changes"
[ExportEvent]
name='CarChange'
trigger=changed(200, [DataCorePlugin.GameData.CarId])

string obsolete = "for haptics not by corner"
[ExportProperty]
name='Freq.Max'
value='400'

[ExportProperty]
name='Freq.Min'
value='20'
